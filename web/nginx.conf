server {
    listen 80;
    
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # SECURITY HEADERS
        # Prevent Clickjacking (disallow page frame embedding)
        add_header X-Frame-Options "DENY" always;

        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Protect referrer information
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Content Security Policy (CSP)
        # Allows self-hosted assets, Google fonts, Scalar CDN, Microsoft Entra login endpoints, and API backend routes
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.ciamlogin.com https://*.azurecontainerapps.io http://localhost:8080;" always;
    }
}
