name: "🚨 Danger Zone: Wipe All Resources"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "DELETE" to confirm destruction of all Azure resources'
        required: true
        default: 'no'
      environment:
        description: 'Environment to destroy'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - pro

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  destroy:
    name: "🧨 Terraform Destroy (${{ github.event.inputs.environment }})"
    if: github.event.inputs.confirm_destroy == 'DELETE'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/terraform/environments/${{ github.event.inputs.environment }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@a65d910e8af852a8061c3276fcc8afbeb69c24ce
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🛠️ Setup Terraform"
        uses: hashicorp/setup-terraform@b9cd54a1e4d0fc1c12140be0db454ee11d1796be

      - name: "📦 Initialize Workspace"
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-healthcheck-bootstrap" \
            -backend-config="storage_account_name=${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.AZURE_STORAGE_CONTAINER }}" \
            -backend-config="key=${{ github.event.inputs.environment }}.terraform.tfstate"

      - name: "🧨 DESTROY ALL RESOURCES"
        run: terraform destroy -auto-approve -var="acr_name=${{ secrets.AZURE_ACR_NAME }}" -var="entra_client_id=${{ secrets.ENTRA_CLIENT_ID }}"
