name: "🚨 Danger Zone: Wipe All Resources"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type "DELETE" to confirm destruction of all Azure resources'
        required: true
        default: 'no'

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: "🧨 Terraform Destroy"
    if: github.event.inputs.confirm_destroy == 'DELETE'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/envs/dev
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🛠️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "📦 Initialize Workspace"
        run: |
          terraform init \
            -backend-config="resource_group_name=rg-healthcheck-bootstrap" \
            -backend-config="storage_account_name=${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.AZURE_STORAGE_CONTAINER }}" \
            -backend-config="key=dev.terraform.tfstate"

      - name: "🧨 DESTROY ALL RESOURCES"
        run: terraform destroy -auto-approve
