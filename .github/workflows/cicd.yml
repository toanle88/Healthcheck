name: "🏁 Full Stack Pipeline"

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'infra/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'infra/**'
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # STAGE 1: THE AUDIT (CI)
  # ==========================================
  audit:
    name: "🛡️ Audit: Quality & Security"
    runs-on: ubuntu-latest
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0 # Required by SonarCloud scan

      - name: "🐹 Setup Go Environment"
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34
        with:
          go-version: '1.26'

      # Cache Go module downloads (~/.cache/go/mod) and
      # the build cache (~/.cache/go/build) so subsequent
      # runs skip re-downloading dependencies.
      - name: "📦 Cache Go Modules"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go/mod
            ~/.cache/go/build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: "📏 Verify Code Formatting"
        run: if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then exit 1; fi

      - name: "🔍 Static Analysis (Vet)"
        run: go vet ./...

      - name: "⚡ Run Unit Tests with Coverage"
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic $(go list -f '{{if .TestGoFiles}}{{.ImportPath}}{{end}}' ./...)

      - name: "🟢 Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "📦 Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: "📦 Install Frontend Dependencies"
        run: pnpm --filter web install --no-frozen-lockfile

      - name: "⚡ Run Frontend Unit Tests with Coverage"
        run: pnpm --filter web run test:unit --coverage

      - name: "🛡️ Check Coverage Quality Gate"
        run: bash scripts/check-coverage.sh

      - name: "SonarCloud Scan"
        uses: SonarSource/sonarcloud-github-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: "🔒 Security Scan (Trivy)"
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # STAGE 2: BUILD & PUSH
  # ==========================================
  build:
    name: "📦 Build: Docker Images"
    needs: audit
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: "🆔 Generate Version Tag"
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@a65d910e8af852a8061c3276fcc8afbeb69c24ce
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🔓 Login to Container Registry"
        run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: "🐳 Build & Push API Image"
        uses: docker/build-push-action@ca052c20bc6a1dd2e305e3960324ae341029cd44
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/api:${{ steps.vars.outputs.sha_short }}
          build-args: APP_VERSION=${{ steps.vars.outputs.sha_short }}

      - name: "🐝 Build & Push Worker Image"
        uses: docker/build-push-action@ca052c20bc6a1dd2e305e3960324ae341029cd44
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/worker:${{ steps.vars.outputs.sha_short }}
          build-args: APP_VERSION=${{ steps.vars.outputs.sha_short }}

      - name: "🌐 Build & Push Web Image"
        uses: docker/build-push-action@ca052c20bc6a1dd2e305e3960324ae341029cd44
        with:
          context: ./web
          file: ./web/Dockerfile.web
          push: true
          tags: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/web:${{ steps.vars.outputs.sha_short }}

      - name: "📂 Build & Push Migrate Image"
        uses: docker/build-push-action@ca052c20bc6a1dd2e305e3960324ae341029cd44
        with:
          context: .
          file: ./Dockerfile.migrate
          push: true
          tags: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/migrate:${{ steps.vars.outputs.sha_short }}

  # ==========================================
  # STAGE 3: DEV DEPLOYMENT WITH ROLLBACK
  # ==========================================
  deploy-dev:
    name: "🚀 Deploy & Test: Dev"
    needs: build
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.deploy.outputs.api_url }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@a65d910e8af852a8061c3276fcc8afbeb69c24ce
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🚀 Deploy and Verify with Rollback"
        id: deploy
        run: |
          chmod +x scripts/deploy-with-rollback.sh
          bash scripts/deploy-with-rollback.sh dev rg-healthcheck-dev ${{ secrets.AZURE_ACR_NAME }} ${{ needs.build.outputs.image_tag }}

  # ==========================================
  # STAGE 4: PRO DEPLOYMENT WITH ROLLBACK
  # ==========================================
  deploy-pro:
    name: "🚀 Deploy & Test: Pro"
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment: pro
    outputs:
      api_url: ${{ steps.deploy.outputs.api_url }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@a65d910e8af852a8061c3276fcc8afbeb69c24ce
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🚀 Deploy and Verify with Rollback"
        id: deploy
        run: |
          chmod +x scripts/deploy-with-rollback.sh
          bash scripts/deploy-with-rollback.sh pro rg-healthcheck-pro ${{ secrets.AZURE_ACR_NAME }} ${{ needs.build.outputs.image_tag }}
