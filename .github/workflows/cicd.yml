name: "🏁 Full Stack Pipeline"

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'infra/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'infra/**'
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # STAGE 1: THE AUDIT (CI)
  # ==========================================
  audit:
    name: "🛡️ Audit: Quality & Security"
    runs-on: ubuntu-latest
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐹 Setup Go Environment"
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: "📏 Verify Code Formatting"
        run: if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then exit 1; fi

      - name: "🔍 Static Analysis (Vet)"
        run: go vet ./...

      - name: "⚡ Run Unit Tests"
        run: go test -v -race ./...

      - name: "🔒 Security Scan (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # STAGE 2: THE FACTORY (Build & Push)
  # ==========================================
  build:
    name: "📦 Build: Docker Images"
    needs: audit # <--- ONLY RUN IF AUDIT PASSES!
    if: github.event_name != 'pull_request' # Don't build/push on PRs, only on push/manual
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🆔 Generate Version Tag"
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🔓 Login to Container Registry"
        run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: "🐳 Build & Push API Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/api:${{ steps.vars.outputs.sha_short }}
          build-args: APP_VERSION=${{ steps.vars.outputs.sha_short }}

      - name: "🐝 Build & Push Worker Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/worker:${{ steps.vars.outputs.sha_short }}
          build-args: APP_VERSION=${{ steps.vars.outputs.sha_short }}

      - name: "🌐 Build & Push Web Image"
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile.web
          push: true
          tags: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/web:${{ steps.vars.outputs.sha_short }}

  # ==========================================
  # STAGE 3: THE DEPLOYER (Fast Update)
  # ==========================================
  deploy:
    name: "🚀 Deploy: Fast CLI Update"
    needs: build # <--- ONLY RUN IF BUILD PASSES!
    runs-on: ubuntu-latest
    steps:
      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "⚡ Update API Container"
        run: |
          az containerapp update \
            --name ca-healthcheck-api-dev \
            --resource-group rg-healthcheck-dev \
            --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/api:${{ needs.build.outputs.image_tag }}

      - name: "⚡ Update Web Container"
        run: |
          az containerapp update \
            --name ca-healthcheck-web-dev \
            --resource-group rg-healthcheck-dev \
            --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/web:${{ needs.build.outputs.image_tag }} \
            --set-env-vars VITE_APP_VERSION=${{ needs.build.outputs.image_tag }}

      - name: "⚡ Update Worker Job"
        run: |
          az containerapp job update \
            --name caj-healthcheck-worker-dev \
            --resource-group rg-healthcheck-dev \
            --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/worker:${{ needs.build.outputs.image_tag }}
