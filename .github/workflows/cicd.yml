name: "🏁 Full Stack Pipeline"

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'infra/**'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'infra/**'
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # STAGE 1: THE AUDIT (CI)
  # ==========================================
  audit:
    name: "🛡️ Audit: Quality & Security"
    runs-on: ubuntu-latest
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐹 Setup Go Environment"
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # Cache Go module downloads (~/.cache/go/mod) and
      # the build cache (~/.cache/go/build) so subsequent
      # runs skip re-downloading dependencies.
      - name: "📦 Cache Go Modules"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go/mod
            ~/.cache/go/build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: "📏 Verify Code Formatting"
        run: if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then exit 1; fi

      - name: "🔍 Static Analysis (Vet)"
        run: go vet ./...

      - name: "⚡ Run Unit Tests"
        run: go test -v -race ./...

      - name: "🔒 Security Scan (Trivy)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ==========================================
  # STAGE 2: BUILD & PUSH
  # ==========================================
  build:
    name: "📦 Build: Docker Images"
    needs: audit
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🆔 Generate Version Tag"
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🔓 Login to Container Registry"
        run: az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: "🐳 Build & Push API Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/api:${{ steps.vars.outputs.sha_short }}
          build-args: APP_VERSION=${{ steps.vars.outputs.sha_short }}

      - name: "🐝 Build & Push Worker Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/worker:${{ steps.vars.outputs.sha_short }}
          build-args: APP_VERSION=${{ steps.vars.outputs.sha_short }}

      - name: "🌐 Build & Push Web Image"
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile.web
          push: true
          tags: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/web:${{ steps.vars.outputs.sha_short }}

  # ==========================================
  # STAGE 3: DEV DEPLOYMENT
  # ==========================================
  deploy-dev:
    name: "🚀 Deploy: Dev"
    needs: build
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.get_url.outputs.api_url }}
    steps:
      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "⚡ Update API Container"
        run: |
          az containerapp update \
            --name ca-healthcheck-api-dev \
            --resource-group rg-healthcheck-dev \
            --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/api:${{ needs.build.outputs.image_tag }}

      - name: "⚡ Update Web Container"
        run: |
          az containerapp update \
            --name ca-healthcheck-web-dev \
            --resource-group rg-healthcheck-dev \
            --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/web:${{ needs.build.outputs.image_tag }} \
            --set-env-vars VITE_APP_VERSION=${{ needs.build.outputs.image_tag }}

      - name: "⚡ Update Worker Job"
        run: |
          az containerapp job update \
            --name caj-healthcheck-worker-dev \
            --resource-group rg-healthcheck-dev \
            --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/worker:${{ needs.build.outputs.image_tag }}

      - name: "🔍 Get API URL"
        id: get_url
        run: |
          FQDN=$(az containerapp show \
            --name ca-healthcheck-api-dev \
            --resource-group rg-healthcheck-dev \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "api_url=https://${FQDN}" >> $GITHUB_OUTPUT

  # ==========================================
  # STAGE 4: DEV SMOKE TEST
  # ==========================================
  smoke-test-dev:
    name: "🔥 Smoke Test: Dev /health Check"
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - name: "🌡️ Hit /health Endpoint"
        run: |
          API_URL="${{ needs.deploy-dev.outputs.api_url }}"
          echo "Smoke-testing: ${API_URL}/health"

          for attempt in $(seq 1 9); do
            HTTP_STATUS=$(curl --silent --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 10 \
              "${API_URL}/health")

            echo "Attempt ${attempt}/9 → HTTP ${HTTP_STATUS}"

            if [ "${HTTP_STATUS}" -eq 200 ]; then
              echo "✅ Smoke test passed (HTTP 200)"
              exit 0
            fi

            sleep 10
          done

          echo "❌ Smoke test failed — /health did not return 200 after 90 s"
          exit 1

  # ==========================================
  # STAGE 5: PRO DEPLOYMENT (Sequential)
  # ==========================================
  deploy-pro:
    name: "🚀 Deploy: Pro"
    needs: [build, smoke-test-dev]
    runs-on: ubuntu-latest
    environment: pro
    outputs:
      api_url: ${{ steps.get_url.outputs.api_url }}
    steps:
      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "⚡ Update API Container"
        run: |
          az containerapp update \
            --name ca-healthcheck-api-pro \
            --resource-group rg-healthcheck-pro \
            --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/api:${{ needs.build.outputs.image_tag }}

      - name: "⚡ Update Web Container"
        run: |
          az containerapp update \
            --name ca-healthcheck-web-pro \
            --resource-group rg-healthcheck-pro \
            --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/web:${{ needs.build.outputs.image_tag }} \
            --set-env-vars VITE_APP_VERSION=${{ needs.build.outputs.image_tag }}

      - name: "⚡ Update Worker Job"
        run: |
          az containerapp job update \
            --name caj-healthcheck-worker-pro \
            --resource-group rg-healthcheck-pro \
            --image ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/worker:${{ needs.build.outputs.image_tag }}

      - name: "🔍 Get API URL"
        id: get_url
        run: |
          FQDN=$(az containerapp show \
            --name ca-healthcheck-api-pro \
            --resource-group rg-healthcheck-pro \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "api_url=https://${FQDN}" >> $GITHUB_OUTPUT

  # ==========================================
  # STAGE 6: PRO SMOKE TEST
  # ==========================================
  smoke-test-pro:
    name: "🔥 Smoke Test: Pro /health Check"
    needs: deploy-pro
    runs-on: ubuntu-latest
    steps:
      - name: "🌡️ Hit /health Endpoint"
        run: |
          API_URL="${{ needs.deploy-pro.outputs.api_url }}"
          echo "Smoke-testing: ${API_URL}/health"

          for attempt in $(seq 1 9); do
            HTTP_STATUS=$(curl --silent --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 10 \
              "${API_URL}/health")

            echo "Attempt ${attempt}/9 → HTTP ${HTTP_STATUS}"

            if [ "${HTTP_STATUS}" -eq 200 ]; then
              echo "✅ Smoke test passed (HTTP 200)"
              exit 0
            fi

            sleep 10
          done

          echo "❌ Smoke test failed — /health did not return 200 after 90 s"
          exit 1
