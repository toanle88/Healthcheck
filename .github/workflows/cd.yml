name: "🚀 CD: Build & Fast Deploy"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # --- 📦 ARTIFACT CREATION (The Factory) ---
  build-and-push:
    name: "📦 Build & Push: Docker Images"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🆔 Generate Version Tag"
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🔓 Login to Container Registry"
        run: az acr login --name crhealthcheckdev

      - name: "🐳 Build & Push API Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: crhealthcheckdev.azurecr.io/api:${{ steps.vars.outputs.sha_short }}
          build-args: APP_VERSION=${{ steps.vars.outputs.sha_short }}

      - name: "🐝 Build & Push Worker Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: crhealthcheckdev.azurecr.io/worker:${{ steps.vars.outputs.sha_short }}
          build-args: APP_VERSION=${{ steps.vars.outputs.sha_short }}

      - name: "🌐 Build & Push Web Image"
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./Dockerfile.web
          push: true
          tags: crhealthcheckdev.azurecr.io/web:${{ steps.vars.outputs.sha_short }}

  # --- 🚀 FAST DEPLOYMENT (The Speedster) ---
  deploy:
    name: "🚀 Fast Deploy: CLI Update"
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "⚡ Update API Container"
        run: |
          az containerapp update \
            --name ca-healthcheck-api-dev \
            --resource-group rg-healthcheck-dev \
            --image crhealthcheckdev.azurecr.io/api:${{ needs.build-and-push.outputs.image_tag }}

      - name: "⚡ Update Web Container"
        run: |
          az containerapp update \
            --name ca-healthcheck-web-dev \
            --resource-group rg-healthcheck-dev \
            --image crhealthcheckdev.azurecr.io/web:${{ needs.build-and-push.outputs.image_tag }} \
            --set-env-vars VITE_APP_VERSION=${{ needs.build-and-push.outputs.image_tag }}

      - name: "⚡ Update Worker Job"
        run: |
          az containerapp job update \
            --name job-healthcheck-worker-dev \
            --resource-group rg-healthcheck-dev \
            --image crhealthcheckdev.azurecr.io/worker:${{ needs.build-and-push.outputs.image_tag }}
