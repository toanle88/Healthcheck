name: "🚀 CD: Build & Deploy"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # --- 📦 ARTIFACT CREATION ---
  build-and-push:
    name: "📦 Build & Push: Docker Images"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🆔 Generate Version Tag"
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🔓 Login to Container Registry"
        run: az acr login --name crhealthcheckdev

      - name: "🐳 Build & Push API Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: crhealthcheckdev.azurecr.io/api:${{ steps.vars.outputs.sha_short }}
          build-args: APP_VERSION=${{ steps.vars.outputs.sha_short }}

      - name: "🐝 Build & Push Worker Image"
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: crhealthcheckdev.azurecr.io/worker:${{ steps.vars.outputs.sha_short }}
          build-args: APP_VERSION=${{ steps.vars.outputs.sha_short }}

      - name: "🌐 Build & Push Web Image"
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./Dockerfile.web
          push: true
          tags: crhealthcheckdev.azurecr.io/web:${{ steps.vars.outputs.sha_short }}

  # --- 🚀 CLOUD DEPLOYMENT ---
  deploy:
    name: "🚀 Deploy: Terraform & Containers"
    needs: build-and-push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/envs/dev
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🛠️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "📦 Initialize Workspace"
        run: terraform init

      - name: "🏗️ Apply Infrastructure Changes"
        run: |
          terraform apply -auto-approve \
            -var="api_image=crhealthcheckdev.azurecr.io/api:${{ needs.build-and-push.outputs.image_tag }}" \
            -var="worker_image=crhealthcheckdev.azurecr.io/worker:${{ needs.build-and-push.outputs.image_tag }}" \
            -var="web_image=crhealthcheckdev.azurecr.io/web:${{ needs.build-and-push.outputs.image_tag }}"
