name: "🏗️ Infrastructure: Core Setup & Maintenance"

on:
  # Manual full apply
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - pro
  # Auto-plan on every PR that touches infra code
  pull_request:
    branches: [ main ]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write   # Required for posting terraform plan comments

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

jobs:
  # ==========================================
  # STAGE 1: SECURITY AUDIT
  # ==========================================
  security_scan:
    name: "🛡️ Security: Checkov Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🔍 Run Checkov Dev"
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform/environments/dev
          config_file: infra/terraform/.checkov.yaml
          framework: terraform
          output_format: cli

      - name: "🔍 Run Checkov Pro"
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/terraform/environments/pro
          framework: terraform
          output_format: cli

  # ==========================================
  # STAGE 2A: TERRAFORM PLAN (PR only)
  # ==========================================
  terraform_plan_pr:
    name: "📋 Terraform: Plan (PR only)"
    needs: security_scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, pro]
    defaults:
      run:
        working-directory: ./infra/terraform/environments/${{ matrix.environment }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🛠️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "📦 Terraform Init"
        run: |
          terraform init -upgrade \
            -backend-config="resource_group_name=rg-healthcheck-bootstrap" \
            -backend-config="storage_account_name=${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.AZURE_STORAGE_CONTAINER }}" \
            -backend-config="key=${{ matrix.environment }}.terraform.tfstate"

      - name: "📋 Terraform Plan"
        id: plan
        continue-on-error: true
        run: |
          terraform plan -no-color \
            -var="acr_name=${{ secrets.AZURE_ACR_NAME }}" \
            -var="entra_client_id=${{ secrets.ENTRA_CLIENT_ID }}" \
            2>&1 | tee /tmp/plan_output.txt

      - name: "💬 Post Plan as PR Comment"
        uses: actions/github-script@v7
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
            const outcome   = process.env.PLAN_OUTCOME;
            const status    = outcome === 'success' ? '✅ Success' : '❌ Failed';
            const maxLen    = 65000;

            const body = planOutput.length > maxLen
              ? planOutput.slice(0, maxLen) + '\n\n> ⚠️ Output truncated — see full log in Actions.'
              : planOutput;

            const comment = `## 🏗️ Terraform Plan (${{ matrix.environment }}) — ${status}

            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`hcl
            ${body}
            \`\`\`

            </details>

            > Run: \`${{ github.run_id }}\` | Triggered by @${{ github.actor }}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(`🏗️ Terraform Plan (${{ matrix.environment }})`)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: botComment.id,
                body:       comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body:         comment,
              });
            }

            if (outcome !== 'success') {
              core.setFailed('Terraform plan failed — see PR comment for details.');
            }

  # ==========================================
  # STAGE 2B: TERRAFORM PLAN (Manual deploy only)
  # ==========================================
  terraform_plan_manual:
    name: "📋 Terraform: Plan"
    needs: security_scan
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/terraform/environments/${{ github.event.inputs.environment }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "🛠️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "📦 Terraform Init"
        run: |
          terraform init -upgrade \
            -backend-config="resource_group_name=rg-healthcheck-bootstrap" \
            -backend-config="storage_account_name=${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.AZURE_STORAGE_CONTAINER }}" \
            -backend-config="key=${{ github.event.inputs.environment }}.terraform.tfstate"

      - name: "📋 Terraform Plan"
        run: |
          terraform plan -no-color -out=tfplan \
            -var="acr_name=${{ secrets.AZURE_ACR_NAME }}" \
            -var="entra_client_id=${{ secrets.ENTRA_CLIENT_ID }}"

      - name: "📤 Upload Terraform Plan"
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}
          path: ./infra/terraform/environments/${{ github.event.inputs.environment }}/tfplan

  # ==========================================
  # STAGE 3: THE DEPLOYER (manual apply only)
  # ==========================================
  terraform:
    name: "🏗️ Terraform Apply"
    needs: [security_scan, terraform_plan_manual] # <--- ONLY RUN IF PLAN AND SECURITY SCAN PASS!
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/terraform/environments/${{ github.event.inputs.environment }}
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🔑 Login to Azure (OIDC)"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "📥 Download Terraform Plan"
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}
          path: ./infra/terraform/environments/${{ github.event.inputs.environment }}

      - name: "🛠️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "📦 Initialize Workspace"
        run: |
          terraform init -upgrade \
            -backend-config="resource_group_name=rg-healthcheck-bootstrap" \
            -backend-config="storage_account_name=${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.AZURE_STORAGE_CONTAINER }}" \
            -backend-config="key=${{ github.event.inputs.environment }}.terraform.tfstate"

      - name: "🔍 Diagnostic: Check Versions"
        run: |
          terraform version
          terraform providers

      - name: "🏗️ Apply Infrastructure Changes"
        run: terraform apply -auto-approve tfplan
