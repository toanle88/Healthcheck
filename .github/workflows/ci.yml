name: "🛡️ CI: Quality & Security Audit"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # --- 🧪 GO QUALITY CHECKS ---
  go-quality:
    name: "🧪 Go: Lint & Test"
    runs-on: ubuntu-latest
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐹 Setup Go Environment"
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: "📏 Verify Code Formatting"
        run: if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then exit 1; fi

      - name: "🔍 Static Analysis (Vet)"
        run: go vet ./...

      - name: "⚡ Run Unit Tests"
        run: go test -v -race ./...

  # --- 🔒 SECURITY SCANNING ---
  security-scan:
    name: "🔒 Security: Trivy FS Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4
      
      - name: "🛡️ Scan for Vulnerabilities"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # --- 🏗️ INFRASTRUCTURE VALIDATION ---
  terraform-check:
    name: "🏗️ Infra: Terraform Validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra/envs/dev
    steps:
      - name: "📂 Checkout Code"
        uses: actions/checkout@v4

      - name: "🛠️ Setup Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "📝 Lint Infrastructure (fmt)"
        run: terraform fmt -check -recursive ../../

      - name: "📦 Initialize Workspace"
        run: terraform init -backend=false

      - name: "✅ Validate Configuration"
        run: terraform validate
