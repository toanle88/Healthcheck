# Dependabot configuration file
# Ref: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Maintain Go dependencies (backend API and worker)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Maintain Node/NPM dependencies (React frontend)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Maintain GitHub Actions workflows dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Maintain Docker base images in the root directory (api, worker, migrate)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Maintain Docker base images in the web directory (web)
  - package-ecosystem: "docker"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Maintain Terraform modules and provider dependencies in bootstrap
  - package-ecosystem: "terraform"
    directory: "/infra/terraform/bootstrap"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Maintain Terraform dependencies in dev environment
  - package-ecosystem: "terraform"
    directory: "/infra/terraform/environments/dev"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  # Maintain Terraform dependencies in pro environment
  - package-ecosystem: "terraform"
    directory: "/infra/terraform/environments/pro"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
