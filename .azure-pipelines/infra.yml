trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**

parameters:
  - name: environment
    displayName: 'Environment to apply'
    type: string
    default: 'dev'
    values:
      - dev
      - pro

variables:
  # Reference your Azure DevOps Service Connection (ARM)
  azureServiceConnection: 'sc-healthcheck-dev'
  # Name of your Azure Container Registry (ACR)
  acrName: 'crhealthcheckdev'
  # Entra/Azure AD Client ID
  entraClientId: 'your-entra-client-id'
  # Terraform backend storage account
  storageAccountName: 'sahealthchecktfstate'
  storageContainerName: 'tfstate'
  resourceGroupName: 'rg-healthcheck-bootstrap'

stages:
  # ==========================================
  # STAGE 1: SECURITY AUDIT
  # ==========================================
  - stage: SecurityScan
    displayName: '🛡️ Security: Checkov Scan'
    jobs:
      - job: RunCheckov
        displayName: 'Checkov Static Analysis'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - script: |
              pip install checkov
              echo "=== Scanning Dev Environment ==="
              checkov -d infra/terraform/environments/dev --config-file infra/terraform/.checkov.yaml --framework terraform --output cli
              echo "=== Scanning Pro Environment ==="
              checkov -d infra/terraform/environments/pro --framework terraform --output cli
            displayName: '🔍 Run Checkov Scan (Dev & Pro)'

  # ==========================================
  # STAGE 2: TERRAFORM PLAN
  # ==========================================
  - stage: TerraformPlan
    displayName: '📋 Terraform: Plan'
    dependsOn: SecurityScan
    jobs:
      - job: terraform_plan_pr
        displayName: '📋 Terraform: Plan (PR only)'
        condition: eq(variables['Build.Reason'], 'PullRequest')
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          matrix:
            dev:
              envName: 'dev'
            pro:
              envName: 'pro'
        steps:
          - checkout: self
          
          - task: AzureCLI@2
            displayName: '🛠️ Terraform Init & Plan ($(envName))'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              addSpnToEnvironment: true
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_CLIENT_SECRET="$servicePrincipalKey"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(subscriptionId)"
                export ARM_USE_OIDC=true

                cd infra/terraform/environments/$(envName)
                
                terraform init -upgrade \
                  -backend-config="resource_group_name=$(resourceGroupName)" \
                  -backend-config="storage_account_name=$(storageAccountName)" \
                  -backend-config="container_name=$(storageContainerName)" \
                  -backend-config="key=$(envName).terraform.tfstate"

                terraform plan -no-color \
                  -var="acr_name=$(acrName)" \
                  -var="entra_client_id=$(entraClientId)"

      - job: terraform_plan_manual
        displayName: '📋 Terraform: Plan (${{ parameters.environment }})'
        condition: ne(variables['Build.Reason'], 'PullRequest')
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          
          - task: AzureCLI@2
            displayName: '🛠️ Terraform Init & Plan (${{ parameters.environment }})'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              addSpnToEnvironment: true
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_CLIENT_SECRET="$servicePrincipalKey"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(subscriptionId)"
                export ARM_USE_OIDC=true

                cd infra/terraform/environments/${{ parameters.environment }}
                
                terraform init -upgrade \
                  -backend-config="resource_group_name=$(resourceGroupName)" \
                  -backend-config="storage_account_name=$(storageAccountName)" \
                  -backend-config="container_name=$(storageContainerName)" \
                  -backend-config="key=${{ parameters.environment }}.terraform.tfstate"

                terraform plan -no-color -out=tfplan \
                  -var="acr_name=$(acrName)" \
                  -var="entra_client_id=$(entraClientId)"

          - task: PublishPipelineArtifact@1
            displayName: '📤 Publish Terraform Plan'
            inputs:
              targetPath: 'infra/terraform/environments/${{ parameters.environment }}/tfplan'
              artifact: 'tfplan-${{ parameters.environment }}'
              publishLocation: 'pipeline'

  # ==========================================
  # STAGE 3: THE DEPLOYER (manual apply only)
  # ==========================================
  - stage: TerraformApply
    displayName: '🏗️ Terraform: Apply'
    dependsOn: TerraformPlan
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: Apply
        displayName: 'Apply Infrastructure Changes (${{ parameters.environment }})'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: DownloadPipelineArtifact@2
            displayName: '📥 Download Terraform Plan'
            inputs:
              buildType: 'current'
              artifactName: 'tfplan-${{ parameters.environment }}'
              targetPath: 'infra/terraform/environments/${{ parameters.environment }}'
          
          - task: AzureCLI@2
            displayName: '🏗️ Apply Infrastructure Changes (${{ parameters.environment }})'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              addSpnToEnvironment: true
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_CLIENT_SECRET="$servicePrincipalKey"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(subscriptionId)"
                export ARM_USE_OIDC=true

                cd infra/terraform/environments/${{ parameters.environment }}
                
                terraform init -upgrade \
                  -backend-config="resource_group_name=$(resourceGroupName)" \
                  -backend-config="storage_account_name=$(storageAccountName)" \
                  -backend-config="container_name=$(storageContainerName)" \
                  -backend-config="key=${{ parameters.environment }}.terraform.tfstate"

                terraform version
                terraform providers

                terraform apply -auto-approve tfplan
