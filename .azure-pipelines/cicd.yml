trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - infra/**
      - docs/**
      - '**.md'

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - infra/**
      - docs/**
      - '**.md'

variables:
  # Reference your Azure DevOps Service Connection (ARM)
  azureServiceConnection: 'sc-healthcheck-dev'
  # Name of your Azure Container Registry (ACR)
  acrName: 'crhealthcheckdev'
  # Go settings
  GOPATH: '$(Pipeline.Workspace)/go'

stages:
  # ==========================================
  # STAGE 1: THE AUDIT (CI)
  # ==========================================
  - stage: Audit
    displayName: '🛡️ Audit: Quality & Security'
    jobs:
      - job: RunAudit
        displayName: 'Verify, Vet, Test & Scan'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 0 # Required by SonarCloud scan

          - task: SonarCloudPrepare@1
            inputs:
              SonarCloud: 'sc-sonarcloud'
              organization: 'toanle88healthcheck'
              scannerMode: 'CLI'
              configMode: 'file'
            displayName: 'SonarCloud Prepare'

          - task: GoTool@0
            inputs:
              version: '1.26'
            displayName: '🐹 Setup Go Environment'

          # Cache Go module downloads and build cache
          - task: Cache@2
            displayName: '📦 Cache Go Modules'
            inputs:
              key: 'go | "$(Agent.OS)" | go.sum'
              restoreKeys: |
                go | "$(Agent.OS)"
              path: $(GOPATH)/pkg/mod

          - script: |
              if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
                echo "❌ Unformatted Go files found. Run 'go fmt ./...' to fix."
                gofmt -l .
                exit 1
              fi
            displayName: '📏 Verify Code Formatting'

          - script: go vet ./...
            displayName: '🔍 Static Analysis (Vet)'

          - script: go test -v -race -coverprofile=coverage.out -covermode=atomic $(go list -f '{{if .TestGoFiles}}{{.ImportPath}}{{end}}' ./...)
            displayName: '⚡ Run Go Unit Tests with Coverage'

          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: '🟢 Setup Node.js'

          - script: |
              npm install -g pnpm@8
              pnpm --filter web install --no-frozen-lockfile
            displayName: '📦 Install Frontend Dependencies'

          - script: pnpm --filter web run test:unit --coverage
            displayName: '⚡ Run Frontend Unit Tests with Coverage'

          - script: bash scripts/check-coverage.sh
            displayName: '🛡️ Check Coverage Quality Gate'

          - task: SonarCloudAnalyze@1
            displayName: 'SonarCloud Analyze'

          - task: SonarCloudPublish@1
            inputs:
              pollingTimeoutSec: '300'
            displayName: 'SonarCloud Publish Quality Gate'

          - script: |
              sudo apt-get install -y wget apt-transport-https gnupg
              wget -qO - https://get.trivy.dev/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
              echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://get.trivy.dev/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
              sudo apt-get update
              sudo apt-get install -y trivy
              trivy fs --ignore-unfixed --format table --severity CRITICAL,HIGH .
            displayName: '🔒 Security Scan (Trivy)'

  # ==========================================
  # STAGE 2: THE FACTORY (Build & Push)
  # ==========================================
  - stage: Build
    displayName: '📦 Build: Docker Images'
    dependsOn: Audit
    # Skip build stage on PRs, only run on pushes or manual triggers
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: BuildAndPush
        displayName: 'Docker Build & Push'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          
          - script: |
              SHA_SHORT=$(git rev-parse --short HEAD)
              echo "##vso[task.setvariable variable=sha_short;isOutput=true]$SHA_SHORT"
              echo "Short SHA: $SHA_SHORT"
            name: vars
            displayName: '🆔 Generate Version Tag'

          - task: AzureCLI@2
            displayName: '🔓 Login to ACR & Build/Push Images'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Authenticate docker client with ACR
                az acr login --name $(acrName)
                
                # Fetch output tag from previous step
                TAG="$(vars.sha_short)"
                
                # Build & Push API Image
                docker build -t $(acrName).azurecr.io/api:$TAG \
                  --build-arg APP_VERSION=$TAG \
                  -f ./Dockerfile.api .
                docker push $(acrName).azurecr.io/api:$TAG
                
                # Build & Push Worker Image
                docker build -t $(acrName).azurecr.io/worker:$TAG \
                  --build-arg APP_VERSION=$TAG \
                  -f ./Dockerfile.worker .
                docker push $(acrName).azurecr.io/worker:$TAG
                
                # Build & Push Web Image
                docker build -t $(acrName).azurecr.io/web:$TAG \
                  -f ./web/Dockerfile.web ./web
                docker push $(acrName).azurecr.io/web:$TAG

                # Build & Push Migrate Image
                docker build -t $(acrName).azurecr.io/migrate:$TAG \
                  -f ./Dockerfile.migrate .
                docker push $(acrName).azurecr.io/migrate:$TAG

  # ==========================================
  # STAGE 3: DEV DEPLOYMENT WITH ROLLBACK
  # ==========================================
  - stage: DeployDev
    displayName: '🚀 Deploy: Dev'
    dependsOn: Build
    variables:
      image_tag: $[ stageDependencies.Build.BuildAndPush.outputs['vars.sha_short'] ]
    jobs:
      - job: DeployContainers
        displayName: 'Deploy Container Apps with Rollback (Dev)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: AzureCLI@2
            name: deploy_step
            displayName: '🚀 Deploy & verify with automatic rollback (Dev)'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                TAG="$(image_tag)"
                echo "Deploying to Dev with tag: $TAG"
                chmod +x scripts/deploy-with-rollback.sh
                bash scripts/deploy-with-rollback.sh dev rg-healthcheck-dev $(acrName) $TAG

  # ==========================================
  # STAGE 4: PRO DEPLOYMENT WITH ROLLBACK
  # ==========================================
  - stage: DeployPro
    displayName: '🚀 Deploy: Pro'
    dependsOn:
      - Build
      - DeployDev
    variables:
      image_tag: $[ stageDependencies.Build.BuildAndPush.outputs['vars.sha_short'] ]
    jobs:
      - deployment: DeployContainers
        displayName: 'Deploy Container Apps with Rollback (Pro)'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'pro'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  name: deploy_step
                  displayName: '🚀 Deploy & verify with automatic rollback (Pro)'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      TAG="$(image_tag)"
                      echo "Deploying to Pro with tag: $TAG"
                      chmod +x scripts/deploy-with-rollback.sh
                      bash scripts/deploy-with-rollback.sh pro rg-healthcheck-pro $(acrName) $TAG
