trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - infra/*
      - docs/*
      - '*.md'

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - infra/*
      - docs/*
      - '*.md'

variables:
  # Reference your Azure DevOps Service Connection (ARM)
  azureServiceConnection: 'sc-healthcheck-dev'
  # Name of your Azure Container Registry (ACR)
  acrName: 'crhealthcheckdev'
  # Go settings
  GOPATH: '$(Pipeline.Workspace)/go'

stages:
  # ==========================================
  # STAGE 1: THE AUDIT (CI)
  # ==========================================
  - stage: Audit
    displayName: '🛡️ Audit: Quality & Security'
    jobs:
      - job: RunAudit
        displayName: 'Verify, Vet, Test & Scan'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: GoTool@0
            inputs:
              version: '1.26'
            displayName: '🐹 Setup Go Environment'

          # Cache Go module downloads and build cache
          - task: Cache@2
            displayName: '📦 Cache Go Modules'
            inputs:
              key: 'go | "$(Agent.OS)" | go.sum'
              restoreKeys: |
                go | "$(Agent.OS)"
              path: $(GOPATH)/pkg/mod

          - script: |
              if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
                echo "❌ Unformatted Go files found. Run 'go fmt ./...' to fix."
                gofmt -l .
                exit 1
              fi
            displayName: '📏 Verify Code Formatting'

          - script: go vet ./...
            displayName: '🔍 Static Analysis (Vet)'

          - script: go test -v -race ./...
            displayName: '⚡ Run Unit Tests'

          # Install and run Trivy Security Scan
          - script: |
              sudo apt-get install -y wget apt-transport-https gnupg lsb-release
              wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
              echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
              sudo apt-get update
              sudo apt-get install -y trivy
              trivy fs --ignore-unfixed --format table --severity CRITICAL,HIGH .
            displayName: '🔒 Security Scan (Trivy)'

  # ==========================================
  # STAGE 2: THE FACTORY (Build & Push)
  # ==========================================
  - stage: Build
    displayName: '📦 Build: Docker Images'
    dependsOn: Audit
    # Skip build stage on PRs, only run on pushes or manual triggers
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: BuildAndPush
        displayName: 'Docker Build & Push'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          
          - script: |
              SHA_SHORT=$(git rev-parse --short HEAD)
              echo "##vso[task.setvariable variable=sha_short;isOutput=true]$SHA_SHORT"
              echo "Short SHA: $SHA_SHORT"
            name: vars
            displayName: '🆔 Generate Version Tag'

          - task: AzureCLI@2
            displayName: '🔓 Login to ACR & Build/Push Images'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Authenticate docker client with ACR
                az acr login --name $(acrName)
                
                # Fetch output tag from previous step
                TAG="$(vars.sha_short)"
                
                # Build & Push API Image
                docker build -t $(acrName).azurecr.io/api:$TAG \
                  --build-arg APP_VERSION=$TAG \
                  -f ./Dockerfile.api .
                docker push $(acrName).azurecr.io/api:$TAG
                
                # Build & Push Worker Image
                docker build -t $(acrName).azurecr.io/worker:$TAG \
                  --build-arg APP_VERSION=$TAG \
                  -f ./Dockerfile.worker .
                docker push $(acrName).azurecr.io/worker:$TAG
                
                # Build & Push Web Image
                docker build -t $(acrName).azurecr.io/web:$TAG \
                  -f ./web/Dockerfile.web ./web
                docker push $(acrName).azurecr.io/web:$TAG

                # Build & Push Migrate Image
                docker build -t $(acrName).azurecr.io/migrate:$TAG \
                  -f ./Dockerfile.migrate .
                docker push $(acrName).azurecr.io/migrate:$TAG

  # ==========================================
  # STAGE 3: DEV DEPLOYMENT
  # ==========================================
  - stage: DeployDev
    displayName: '🚀 Deploy: Dev'
    dependsOn: Build
    variables:
      # Retrieve the image tag from the Build stage's output variable
      image_tag: $[ stageDependencies.Build.BuildAndPush.outputs['vars.sha_short'] ]
      containerAppApi: 'ca-healthcheck-api-dev'
      containerAppWeb: 'ca-healthcheck-web-dev'
      containerAppJobWorker: 'caj-healthcheck-worker-dev'
      containerAppJobMigrate: 'caj-healthcheck-migrate-dev'
      resourceGroup: 'rg-healthcheck-dev'
    jobs:
      - job: DeployContainers
        displayName: 'Deploy Container Apps (Dev)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: AzureCLI@2
            name: deploy_step
            displayName: '⚡ Update Container Apps & Job (Dev)'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                TAG="$(image_tag)"
                echo "Deploying to Dev with tag: $TAG"

                # Update Migrate Job
                az containerapp job update \
                  --name $(containerAppJobMigrate) \
                  --resource-group $(resourceGroup) \
                  --image $(acrName).azurecr.io/migrate:$TAG

                # Start Migrate Job
                EXECUTION_NAME=$(az containerapp job start \
                  --name $(containerAppJobMigrate) \
                  --resource-group $(resourceGroup) \
                  --query "name" -o tsv)
                echo "Migration job started: $EXECUTION_NAME"

                # Wait for completion
                while true; do
                  STATUS=$(az containerapp job execution show \
                    --name $(containerAppJobMigrate) \
                    --resource-group $(resourceGroup) \
                    --job-execution-name $EXECUTION_NAME \
                    --query "properties.status" -o tsv)
                  echo "Current migration job status: $STATUS"
                  if [ "$STATUS" = "Succeeded" ]; then
                    echo "✅ Migrations completed successfully"
                    break
                  elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Canceled" ]; then
                    echo "❌ Migrations failed or were canceled"
                    exit 1
                  fi
                  sleep 10
                done

                # Update API App
                az containerapp update \
                  --name $(containerAppApi) \
                  --resource-group $(resourceGroup) \
                  --image $(acrName).azurecr.io/api:$TAG
                
                # Update Web App
                az containerapp update \
                  --name $(containerAppWeb) \
                  --resource-group $(resourceGroup) \
                  --image $(acrName).azurecr.io/web:$TAG \
                  --set-env-vars VITE_APP_VERSION=$TAG
                
                # Update Worker Job
                az containerapp job update \
                  --name $(containerAppJobWorker) \
                  --resource-group $(resourceGroup) \
                  --image $(acrName).azurecr.io/worker:$TAG
                  
                # Fetch FQDN of the API Container App
                FQDN=$(az containerapp show \
                  --name $(containerAppApi) \
                  --resource-group $(resourceGroup) \
                  --query "properties.configuration.ingress.fqdn" \
                  --output tsv)
                
                echo "##vso[task.setvariable variable=api_url;isOutput=true]https://$FQDN"

  # ==========================================
  # STAGE 4: DEV SMOKE TEST
  # ==========================================
  - stage: SmokeTestDev
    displayName: '🔥 Smoke Test: Dev /health Check'
    dependsOn: DeployDev
    variables:
      # Retrieve the live API URL from the DeployDev stage
      api_url: $[ stageDependencies.DeployDev.DeployContainers.outputs['deploy_step.api_url'] ]
    jobs:
      - job: RunSmokeTest
        displayName: 'Verify Live Endpoint (Dev)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              API_URL="$(api_url)"
              echo "Smoke-testing: ${API_URL}/health"
              
              for attempt in $(seq 1 9); do
                HTTP_STATUS=$(curl --silent --output /dev/null \
                  --write-out "%{http_code}" \
                  --max-time 10 \
                  "${API_URL}/health")
                
                echo "Attempt ${attempt}/9 → HTTP ${HTTP_STATUS}"
                
                if [ "${HTTP_STATUS}" -eq 200 ]; then
                  echo "✅ Smoke test passed (HTTP 200)"
                  exit 0
                fi
                
                sleep 10
              done
              
              echo "❌ Smoke test failed — /health did not return 200 after 90 s"
              exit 1
            displayName: '🌡️ Hit /health Endpoint'

  # ==========================================
  # STAGE 5: PRO DEPLOYMENT
  # ==========================================
  - stage: DeployPro
    displayName: '🚀 Deploy: Pro'
    dependsOn:
      - Build
      - SmokeTestDev
    variables:
      # Retrieve the image tag from the Build stage's output variable
      image_tag: $[ stageDependencies.Build.BuildAndPush.outputs['vars.sha_short'] ]
      containerAppApi: 'ca-healthcheck-api-pro'
      containerAppWeb: 'ca-healthcheck-web-pro'
      containerAppJobWorker: 'caj-healthcheck-worker-pro'
      containerAppJobMigrate: 'caj-healthcheck-migrate-pro'
      resourceGroup: 'rg-healthcheck-pro'
    jobs:
      - deployment: DeployContainers
        displayName: 'Deploy Container Apps (Pro)'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'pro'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  name: deploy_step
                  displayName: '⚡ Update Container Apps & Job (Pro)'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      TAG="$(image_tag)"
                      echo "Deploying to Pro with tag: $TAG"

                      # Update Migrate Job
                      az containerapp job update \
                        --name $(containerAppJobMigrate) \
                        --resource-group $(resourceGroup) \
                        --image $(acrName).azurecr.io/migrate:$TAG

                      # Start Migrate Job
                      EXECUTION_NAME=$(az containerapp job start \
                        --name $(containerAppJobMigrate) \
                        --resource-group $(resourceGroup) \
                        --query "name" -o tsv)
                      echo "Migration job started: $EXECUTION_NAME"

                      # Wait for completion
                      while true; do
                        STATUS=$(az containerapp job execution show \
                          --name $(containerAppJobMigrate) \
                          --resource-group $(resourceGroup) \
                          --job-execution-name $EXECUTION_NAME \
                          --query "properties.status" -o tsv)
                        echo "Current migration job status: $STATUS"
                        if [ "$STATUS" = "Succeeded" ]; then
                          echo "✅ Migrations completed successfully"
                          break
                        elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Canceled" ]; then
                          echo "❌ Migrations failed or were canceled"
                          exit 1
                        fi
                        sleep 10
                      done

                      # Update API App
                      az containerapp update \
                        --name $(containerAppApi) \
                        --resource-group $(resourceGroup) \
                        --image $(acrName).azurecr.io/api:$TAG
                      
                      # Update Web App
                      az containerapp update \
                        --name $(containerAppWeb) \
                        --resource-group $(resourceGroup) \
                        --image $(acrName).azurecr.io/web:$TAG \
                        --set-env-vars VITE_APP_VERSION=$TAG
                      
                      # Update Worker Job
                      az containerapp job update \
                        --name $(containerAppJobWorker) \
                        --resource-group $(resourceGroup) \
                        --image $(acrName).azurecr.io/worker:$TAG
                        
                      # Fetch FQDN of the API Container App
                      FQDN=$(az containerapp show \
                        --name $(containerAppApi) \
                        --resource-group $(resourceGroup) \
                        --query "properties.configuration.ingress.fqdn" \
                        --output tsv)
                      
                      echo "##vso[task.setvariable variable=api_url;isOutput=true]https://$FQDN"

  # ==========================================
  # STAGE 6: PRO SMOKE TEST
  # ==========================================
  - stage: SmokeTestPro
    displayName: '🔥 Smoke Test: Pro /health Check'
    dependsOn: DeployPro
    variables:
      # Retrieve the live API URL from the DeployPro stage
      api_url: $[ stageDependencies.DeployPro.DeployContainers.outputs['DeployContainers.deploy_step.api_url'] ]
    jobs:
      - job: RunSmokeTest
        displayName: 'Verify Live Endpoint (Pro)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              API_URL="$(api_url)"
              echo "Smoke-testing: ${API_URL}/health"
              
              for attempt in $(seq 1 9); do
                HTTP_STATUS=$(curl --silent --output /dev/null \
                  --write-out "%{http_code}" \
                  --max-time 10 \
                  "${API_URL}/health")
                
                echo "Attempt ${attempt}/9 → HTTP ${HTTP_STATUS}"
                
                if [ "${HTTP_STATUS}" -eq 200 ]; then
                  echo "✅ Smoke test passed (HTTP 200)"
                  exit 0
                fi
                
                sleep 10
              done
              
              echo "❌ Smoke test failed — /health did not return 200 after 90 s"
              exit 1
            displayName: '🌡️ Hit /health Endpoint'
