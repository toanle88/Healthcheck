services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: healthcheck
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/healthcheck?sslmode=disable
      - PORT=8080
      - ENV=development
      - ENTRA_TENANT_ID=cea4bf39-5592-4b9c-bed9-0729bbf40cd4
      - ENTRA_CLIENT_ID=a91de45f-2874-438b-aaa5-e0ae74985f40
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/healthcheck?sslmode=disable
    ports:
      - "8081:8081" # Prometheus metrics for the worker
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.web
    ports:
      - "5173:80" # Map host 5173 to Nginx port 80
    environment:
      - VITE_API_URL=http://localhost:8080
      - VITE_APP_VERSION=local-dev
      - VITE_ENTRA_CLIENT_ID=a91de45f-2874-438b-aaa5-e0ae74985f40
      - VITE_ENTRA_TENANT_ID=cea4bf39-5592-4b9c-bed9-0729bbf40cd4
    depends_on:
      - api

  jaeger:
    image: jaegertracing/all-in-one:1.60
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318" # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

volumes:
  pgdata:
